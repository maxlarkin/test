<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <link rel="stylesheet" href="css/style-react.css">
    <title>React</title>
    <script src="https://unpkg.com/react@16/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@16/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>
</head>
<body>

<div id="root">

</div>
<div id="app"></div>


<script type="text/babel">
    const axios = require('axios');

    // Make a request for a user with a given ID
    axios.get('/react/ajax/user.php?user=1')
        .then(function (response) {
            // handle success
            console.log(response);
        })
        .catch(function (error) {
            // handle error
            console.log(error);
        })
        .finally(function () {
            // always executed
        });


    function formatName(user) {
        return user.firstName + ' ' + user.lastName;
    }

    const user = {
        firstName: 'Max',
        lastName: 'Larkin'
    };

    const element = (
        <h1>
            Здравствуй, {formatName(user)}
        </h1>
    );

    ReactDOM.render(
        element,
        document.getElementById('root')
    );
/////////////////////////////////////////////////////////////////////////////////////////////////////////////////

const TabContent = ({ title, one, two, three, four, five}) => (
    <div className="tabcontent">
        <h2>{one}</h2>
        <h2>{two}</h2>
        <h2>{three}</h2>
        <h2>{four}</h2>
        <h2>{five}</h2>
    </div>
);

function Tabs({ items }) {
    const [ active, setActive ] = React.useState(null);

    const openTab = e => setActive(+e.target.dataset.index);

    return (
        <div>
            <div className="tab">
                {items.map((n, i) => (
                    <button
                        className={`tablinks ${i === active ? 'active' : ''}`}
                        onClick={openTab}
                        data-index={i}
                    >{n.title}</button>
                ))}
            </div>
            {items[active] && <TabContent {...items[active]} />}
        </div>
    );
}

const items = [
    {
        title: 'пользователь',
        one: 'id - 48.513.235.12',
        two: 'имя - Максим',
        three: 'фамилия - Ларкин',
        four: 'отчество - Сергеевич',
        five: 'должность - программист'
    },
    {
        title: 'данные',
        one: 'email - maxlarkin2007@gmail.com',
        two: 'телефон - 8 982 122 33 50',
        three: 'адрес - Александровская 19',
        four: 'пол - мужской',
        five: 'возраст - 12 лет'
    },
];

ReactDOM.render(<Tabs items={items} />, document.getElementById('app'));
</script>

<script src="react.js"></script>
</body>
</html>
